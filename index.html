<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>桌球大师 3D - 在线对战版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* 登录界面 */
        #login-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s ease;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        .login-box h1 {
            font-size: 32px;
            margin-bottom: 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }

        .input-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            margin-top: 10px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .divider {
            margin: 20px 0;
            color: #888;
            font-size: 14px;
        }

        .guest-btn {
            background: #f5f5f5;
            color: #333;
            padding: 10px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .guest-btn:hover {
            background: #e0e0e0;
        }

        /* 游戏UI界面 */
        #game-ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: none;
        }

        .hud-top {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .player-info {
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border-radius: 15px;
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .player-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 18px;
        }

        .player-name {
            font-size: 14px;
            margin-bottom: 2px;
        }

        .player-score {
            font-size: 20px;
            font-weight: bold;
            color: #00ff88;
        }

        .game-status {
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 30px;
            border-radius: 20px;
            color: white;
            text-align: center;
            pointer-events: auto;
        }

        .game-status h3 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .game-status p {
            font-size: 14px;
            color: #aaa;
        }

        .controls-bottom {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            pointer-events: auto;
        }

        .game-btn {
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            backdrop-filter: blur(10px);
        }

        .game-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
        }

        /* 力度条 */
        #power-indicator {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 12px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 6px;
            overflow: hidden;
            pointer-events: auto;
        }

        #power-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #00ff00, #ffff00, #ff0000);
            transition: width 0.05s ease;
            border-radius: 6px;
        }

        /* 匹配界面 */
        #matching-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 900;
        }

        .matching-spinner {
            width: 80px;
            height: 80px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .matching-text {
            color: white;
            font-size: 18px;
            margin-bottom: 10px;
        }

        .matching-tips {
            color: #888;
            font-size: 14px;
            max-width: 300px;
            text-align: center;
        }

        /* 聊天窗口 */
        #chat-window {
            position: absolute;
            bottom: 100px;
            right: 20px;
            width: 300px;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 15px;
            padding: 15px;
            pointer-events: auto;
            display: none;
        }

        .chat-messages {
            height: 200px;
            overflow-y: auto;
            margin-bottom: 10px;
        }

        .chat-message {
            margin-bottom: 8px;
            color: white;
            font-size: 14px;
        }

        .chat-message .name {
            font-weight: bold;
            color: #667eea;
        }

        .chat-input {
            width: 100%;
            padding: 8px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 5px;
            color: white;
            font-size: 14px;
        }

        .chat-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .login-box {
                padding: 30px;
            }

            .hud-top {
                flex-direction: column;
                gap: 10px;
            }

            .player-info {
                width: 100%;
                justify-content: center;
            }

            .controls-bottom {
                width: 90%;
                flex-direction: column;
                align-items: center;
            }

            .game-btn {
                width: 100%;
            }

            #chat-window {
                width: 250px;
                right: 10px;
                bottom: 80px;
            }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <!-- 登录界面 -->
        <div id="login-screen">
            <div class="login-box">
                <h1>🎱 桌球大师 3D</h1>
                <div class="input-group">
                    <label>用户名</label>
                    <input type="text" id="username" placeholder="请输入用户名" />
                </div>
                <div class="input-group">
                    <label>密码</label>
                    <input type="password" id="password" placeholder="请输入密码" />
                </div>
                <button class="login-btn" id="login-submit">开始游戏</button>
                <div class="divider">或</div>
                <button class="guest-btn" id="guest-login">游客登录</button>
            </div>
        </div>

        <!-- 匹配界面 -->
        <div id="matching-screen">
            <div class="matching-spinner"></div>
            <div class="matching-text">正在寻找对手...</div>
            <div class="matching-tips">预计匹配时间：10-30秒</div>
        </div>

        <!-- 游戏UI -->
        <div id="game-ui">
            <div class="hud-top">
                <div class="player-info">
                    <div class="player-avatar" id="player1-avatar">我</div>
                    <div>
                        <div class="player-name" id="player1-name">玩家1</div>
                        <div class="player-score" id="player1-score">0</div>
                    </div>
                </div>
                <div class="game-status">
                    <h3 id="game-status-text">等待对手</h3>
                    <p id="game-status-sub">准备开始</p>
                </div>
                <div class="player-info">
                    <div class="player-avatar" id="player2-avatar">对</div>
                    <div>
                        <div class="player-name" id="player2-name">玩家2</div>
                        <div class="player-score" id="player2-score">0</div>
                    </div>
                </div>
            </div>

            <div id="power-indicator">
                <div id="power-bar"></div>
            </div>

            <div class="controls-bottom">
                <button class="game-btn btn-primary" id="find-match">匹配对战</button>
                <button class="game-btn btn-secondary" id="toggle-chat">聊天</button>
                <button class="game-btn btn-secondary" id="quit-game">退出</button>
            </div>

            <div id="chat-window">
                <div class="chat-messages" id="chat-messages"></div>
                <input type="text" class="chat-input" id="chat-input" placeholder="输入消息..." />
            </div>
        </div>
    </div>

    <!-- 引入 Three.js 和相关库 -->
     
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="./3d-billiard-game.js"></script>
</body>
</html>
